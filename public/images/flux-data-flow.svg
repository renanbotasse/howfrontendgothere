<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Instrument Sans', system-ui, sans-serif">
  <rect width="680" height="200" fill="#131420"/>

  <text x="340" y="20" font-size="11" fill="#4a5568" text-anchor="middle" letter-spacing="0.08em">FLUX — UNIDIRECTIONAL DATA FLOW</text>

  <!-- Nodes -->
  <!-- Action -->
  <rect x="20" y="72" width="120" height="56" rx="6" fill="#1f2035" stroke="#ff3c00" stroke-width="1.5"/>
  <text x="80" y="97" font-size="12" font-weight="600" fill="#ff3c00" text-anchor="middle">Action</text>
  <text x="80" y="113" font-size="10" fill="#a0aec0" text-anchor="middle">{ type, payload }</text>

  <!-- Dispatcher -->
  <rect x="192" y="72" width="120" height="56" rx="6" fill="#1f2035" stroke="#1d242f"/>
  <text x="252" y="97" font-size="12" font-weight="600" fill="#f7fafc" text-anchor="middle">Dispatcher</text>
  <text x="252" y="113" font-size="10" fill="#a0aec0" text-anchor="middle">central router</text>

  <!-- Store -->
  <rect x="364" y="72" width="120" height="56" rx="6" fill="#1f2035" stroke="#1d242f"/>
  <text x="424" y="97" font-size="12" font-weight="600" fill="#f7fafc" text-anchor="middle">Store</text>
  <text x="424" y="113" font-size="10" fill="#a0aec0" text-anchor="middle">state + logic</text>

  <!-- View -->
  <rect x="536" y="72" width="124" height="56" rx="6" fill="#1f2035" stroke="#1d242f"/>
  <text x="598" y="97" font-size="12" font-weight="600" fill="#f7fafc" text-anchor="middle">View</text>
  <text x="598" y="113" font-size="10" fill="#a0aec0" text-anchor="middle">React components</text>

  <!-- Forward arrows -->
  <defs>
    <marker id="fl" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#ff3c00" stroke-width="1.2"/>
    </marker>
    <marker id="fl2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#4a5568" stroke-width="1.2"/>
    </marker>
  </defs>
  <line x1="140" y1="100" x2="192" y2="100" stroke="#ff3c00" stroke-width="1.5" marker-end="url(#fl)"/>
  <line x1="312" y1="100" x2="364" y2="100" stroke="#ff3c00" stroke-width="1.5" marker-end="url(#fl)"/>
  <line x1="484" y1="100" x2="536" y2="100" stroke="#ff3c00" stroke-width="1.5" marker-end="url(#fl)"/>

  <!-- Return arrow: View → Action (bottom) -->
  <path d="M598,128 L598,168 L80,168 L80,128" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fl2)"/>
  <text x="340" y="162" font-size="10" fill="#4a5568" text-anchor="middle">user interaction triggers new action</text>

  <!-- Labels -->
  <text x="340" y="190" font-size="10" fill="#4a5568" text-anchor="middle">data flows in one direction only — no two-way binding, predictable state</text>
</svg>
