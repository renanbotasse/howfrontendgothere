<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Instrument Sans', system-ui, sans-serif">
  <rect width="680" height="180" fill="#131420"/>

  <!-- Client -->
  <rect x="30" y="30" width="140" height="110" rx="6" fill="#1f2035" stroke="#1d242f"/>
  <rect x="42" y="42" width="116" height="74" rx="3" fill="#1a1b2e" stroke="#1d242f"/>
  <rect x="42" y="42" width="116" height="12" rx="3" fill="#1d242f"/>
  <circle cx="53" cy="48" r="2" fill="#4a5568"/>
  <circle cx="61" cy="48" r="2" fill="#4a5568"/>
  <circle cx="69" cy="48" r="2" fill="#4a5568"/>
  <rect x="50" y="62" width="100" height="6" rx="2" fill="#1d242f"/>
  <rect x="50" y="74" width="78" height="5" rx="2" fill="#1d242f"/>
  <rect x="50" y="85" width="90" height="5" rx="2" fill="#1d242f"/>
  <rect x="50" y="96" width="60" height="5" rx="2" fill="#1d242f"/>
  <text x="100" y="128" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Browser</text>
  <text x="100" y="142" font-size="10" fill="#a0aec0" text-anchor="middle">Client</text>

  <!-- Server -->
  <rect x="510" y="30" width="140" height="110" rx="6" fill="#1f2035" stroke="#1d242f"/>
  <rect x="532" y="42" width="96" height="18" rx="3" fill="#1a1b2e" stroke="#1d242f"/>
  <circle cx="542" cy="51" r="3" fill="#ff3c00"/>
  <rect x="532" y="66" width="96" height="18" rx="3" fill="#1a1b2e" stroke="#1d242f"/>
  <circle cx="542" cy="75" r="3" fill="#4a5568"/>
  <rect x="532" y="90" width="96" height="18" rx="3" fill="#1a1b2e" stroke="#1d242f"/>
  <circle cx="542" cy="99" r="3" fill="#4a5568"/>
  <text x="580" y="128" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Web Server</text>
  <text x="580" y="142" font-size="10" fill="#a0aec0" text-anchor="middle">Apache · Nginx</text>

  <!-- Arrows -->
  <defs>
    <marker id="cs1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#ff3c00" stroke-width="1.2"/>
    </marker>
    <marker id="cs2" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6" fill="none" stroke="#a0aec0" stroke-width="1.2"/>
    </marker>
  </defs>

  <line x1="170" y1="68" x2="510" y2="68" stroke="#ff3c00" stroke-width="1.5" marker-end="url(#cs1)"/>
  <text x="340" y="62" font-size="11" fill="#ff3c00" text-anchor="middle">HTTP Request — GET /page.html</text>

  <line x1="510" y1="104" x2="170" y2="104" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#cs2)"/>
  <text x="340" y="98" font-size="11" fill="#a0aec0" text-anchor="middle">HTTP Response — 200 OK + HTML</text>

  <text x="340" y="168" font-size="10" fill="#4a5568" text-anchor="middle">Static web: server reads file from disk and returns it — no logic, no database</text>
</svg>
