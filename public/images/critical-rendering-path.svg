<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Instrument Sans', system-ui, sans-serif">
  <rect width="680" height="200" fill="#131420"/>

  <text x="340" y="20" font-size="11" fill="#4a5568" text-anchor="middle" letter-spacing="0.08em">CRITICAL RENDERING PATH</text>

  <!-- DOM box -->
  <rect x="14" y="36" width="74" height="60" rx="5" fill="#1f2035" stroke="#ff3c00" stroke-width="1.5"/>
  <text x="51" y="60" font-size="11" font-weight="600" fill="#ff3c00" text-anchor="middle">DOM</text>
  <text x="51" y="76" font-size="9" fill="#a0aec0" text-anchor="middle">HTML</text>
  <text x="51" y="88" font-size="9" fill="#4a5568" text-anchor="middle">parsing</text>

  <!-- CSSOM box -->
  <rect x="14" y="108" width="74" height="60" rx="5" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <text x="51" y="132" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">CSSOM</text>
  <text x="51" y="148" font-size="9" fill="#a0aec0" text-anchor="middle">CSS</text>
  <text x="51" y="160" font-size="9" fill="#4a5568" text-anchor="middle">render-block</text>

  <!-- Arrow DOM + CSSOM → Render Tree -->
  <line x1="88" y1="66" x2="116" y2="100" stroke="#1d242f" stroke-width="1.5"/>
  <line x1="88" y1="138" x2="116" y2="108" stroke="#1d242f" stroke-width="1.5"/>

  <!-- Render Tree -->
  <rect x="116" y="66" width="100" height="60" rx="5" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <text x="166" y="90" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Render Tree</text>
  <text x="166" y="106" font-size="9" fill="#a0aec0" text-anchor="middle">visible nodes + styles</text>

  <!-- Arrow -->
  <defs>
    <marker id="ra" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#4a5568" stroke-width="1.2"/>
    </marker>
  </defs>
  <line x1="216" y1="96" x2="252" y2="96" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ra)"/>

  <!-- Layout -->
  <rect x="252" y="66" width="90" height="60" rx="5" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <text x="297" y="90" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Layout</text>
  <text x="297" y="106" font-size="9" fill="#a0aec0" text-anchor="middle">position and size</text>

  <line x1="342" y1="96" x2="374" y2="96" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ra)"/>

  <!-- Paint -->
  <rect x="374" y="66" width="80" height="60" rx="5" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <text x="414" y="90" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Paint</text>
  <text x="414" y="106" font-size="9" fill="#a0aec0" text-anchor="middle">visual instructions</text>

  <line x1="454" y1="96" x2="486" y2="96" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ra)"/>

  <!-- Composite -->
  <rect x="486" y="66" width="100" height="60" rx="5" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <text x="536" y="90" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Composite</text>
  <text x="536" y="106" font-size="9" fill="#a0aec0" text-anchor="middle">layers → GPU</text>

  <line x1="586" y1="96" x2="618" y2="96" stroke="#ff3c00" stroke-width="2" marker-end="url(#ra)"/>

  <!-- Screen -->
  <rect x="618" y="66" width="52" height="60" rx="5" fill="#1f2035" stroke="#ff3c00" stroke-width="1.5"/>
  <text x="644" y="90" font-size="11" font-weight="600" fill="#ff3c00" text-anchor="middle">Pixel</text>
  <text x="644" y="106" font-size="9" fill="#a0aec0" text-anchor="middle">on screen</text>

  <!-- Bottom note -->
  <text x="51" y="183" font-size="9" fill="#ff3c00">⚠ JS blocks DOM</text>
  <text x="51" y="195" font-size="9" fill="#4a5568">CSS blocks render</text>
  <text x="297" y="183" font-size="9" fill="#4a5568" text-anchor="middle">reflow on changes</text>
  <text x="536" y="183" font-size="9" fill="#a0aec0" text-anchor="middle">separate thread (GPU)</text>
</svg>
