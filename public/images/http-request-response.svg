<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Instrument Sans', system-ui, sans-serif">
  <rect width="680" height="200" fill="#131420"/>

  <!-- Client -->
  <rect x="40" y="50" width="120" height="100" rx="6" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <!-- Browser icon lines -->
  <rect x="52" y="62" width="96" height="68" rx="3" fill="#1a1b2e" stroke="#1d242f" stroke-width="1"/>
  <rect x="52" y="62" width="96" height="12" rx="3" fill="#1d242f"/>
  <circle cx="63" cy="68" r="2.5" fill="#4a5568"/>
  <circle cx="72" cy="68" r="2.5" fill="#4a5568"/>
  <circle cx="81" cy="68" r="2.5" fill="#4a5568"/>
  <rect x="60" y="82" width="80" height="6" rx="2" fill="#1d242f"/>
  <rect x="60" y="94" width="60" height="4" rx="2" fill="#1d242f"/>
  <rect x="60" y="104" width="70" height="4" rx="2" fill="#1d242f"/>
  <rect x="60" y="114" width="50" height="4" rx="2" fill="#1d242f"/>
  <text x="100" y="148" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Browser</text>
  <text x="100" y="162" font-size="10" fill="#a0aec0" text-anchor="middle">Client</text>

  <!-- Server -->
  <rect x="520" y="50" width="120" height="100" rx="6" fill="#1f2035" stroke="#1d242f" stroke-width="1"/>
  <!-- Server icon -->
  <rect x="542" y="62" width="76" height="16" rx="3" fill="#1a1b2e" stroke="#1d242f" stroke-width="1"/>
  <circle cx="550" cy="70" r="3" fill="#ff3c00"/>
  <rect x="542" y="84" width="76" height="16" rx="3" fill="#1a1b2e" stroke="#1d242f" stroke-width="1"/>
  <circle cx="550" cy="92" r="3" fill="#4a5568"/>
  <rect x="542" y="106" width="76" height="16" rx="3" fill="#1a1b2e" stroke="#1d242f" stroke-width="1"/>
  <circle cx="550" cy="114" r="3" fill="#4a5568"/>
  <text x="580" y="139" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Server</text>
  <text x="580" y="153" font-size="10" fill="#a0aec0" text-anchor="middle">Origin / CDN</text>

  <!-- Request arrow -->
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7" fill="none" stroke="#ff3c00" stroke-width="1.5"/>
    </marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <path d="M7,0 L0,3.5 L7,7" fill="none" stroke="#a0aec0" stroke-width="1.5"/>
    </marker>
  </defs>

  <line x1="160" y1="85" x2="520" y2="85" stroke="#ff3c00" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="340" y="79" font-size="11" fill="#ff3c00" text-anchor="middle" font-weight="600">GET /index.html HTTP/2</text>
  <text x="340" y="93" font-size="10" fill="#a0aec0" text-anchor="middle">Host: github.com  ·  Accept: text/html  ·  Cookie: …</text>

  <line x1="520" y1="120" x2="160" y2="120" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="340" y="114" font-size="11" fill="#a0aec0" text-anchor="middle" font-weight="600">200 OK</text>
  <text x="340" y="128" font-size="10" fill="#4a5568" text-anchor="middle">Content-Type: text/html  ·  Cache-Control: no-cache  ·  body…</text>

  <!-- Labels -->
  <text x="340" y="182" font-size="10" fill="#4a5568" text-anchor="middle">HTTP is a pull protocol — the client asks, the server responds</text>
</svg>
