<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Instrument Sans', system-ui, sans-serif">
  <rect width="680" height="200" fill="#131420"/>

  <text x="340" y="20" font-size="11" fill="#4a5568" text-anchor="middle" letter-spacing="0.08em">BASELINE — CROSS-BROWSER SUPPORT</text>

  <!-- Timeline bar -->
  <rect x="40" y="44" width="600" height="8" rx="4" fill="#1d242f"/>

  <!-- Labels: browsers ship -->
  <!-- Chrome ships at x=100 -->
  <line x1="160" y1="36" x2="160" y2="60" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="160" y="32" font-size="9" fill="#4a5568" text-anchor="middle">Chrome</text>

  <!-- Firefox at x=220 -->
  <line x1="240" y1="36" x2="240" y2="60" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="240" y="32" font-size="9" fill="#4a5568" text-anchor="middle">Firefox</text>

  <!-- Safari at x=320 -->
  <line x1="360" y1="36" x2="360" y2="60" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="360" y="32" font-size="9" fill="#4a5568" text-anchor="middle">Safari</text>

  <!-- Edge at x=380 -->
  <line x1="420" y1="36" x2="420" y2="60" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="420" y="32" font-size="9" fill="#4a5568" text-anchor="middle">Edge</text>

  <!-- Newly Available marker (all 4 major browsers shipped) -->
  <line x1="420" y1="44" x2="420" y2="115" stroke="#ff3c00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="300" y="68" width="240" height="40" rx="5" fill="#1f2035" stroke="#ff3c00" stroke-width="1.5"/>
  <text x="420" y="85" font-size="11" font-weight="600" fill="#ff3c00" text-anchor="middle">Newly Available</text>
  <text x="420" y="101" font-size="10" fill="#a0aec0" text-anchor="middle">all major browsers support it</text>

  <!-- 30-month mark -->
  <line x1="580" y1="44" x2="580" y2="115" stroke="#a0aec0" stroke-width="1.5"/>
  <rect x="460" y="118" width="200" height="40" rx="5" fill="#1f2035" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="560" y="135" font-size="11" font-weight="600" fill="#f7fafc" text-anchor="middle">Widely Available</text>
  <text x="560" y="151" font-size="10" fill="#a0aec0" text-anchor="middle">30 months later — safe to use</text>

  <!-- Fill newly available range -->
  <rect x="420" y="44" width="160" height="8" rx="0" fill="#ff3c00" fill-opacity="0.3"/>
  <rect x="580" y="44" width="60" height="8" rx="4" fill="#a0aec0" fill-opacity="0.4"/>

  <!-- Labels at bottom -->
  <text x="40" y="172" font-size="10" fill="#4a5568">← feature not supported</text>
  <text x="420" y="172" font-size="10" fill="#ff3c00" text-anchor="middle">Newly Available →</text>
  <text x="640" y="172" font-size="10" fill="#a0aec0" text-anchor="end">Widely Available</text>

  <text x="340" y="192" font-size="10" fill="#4a5568" text-anchor="middle">Baseline is the "safe to use without polyfill in production" signal defined by the W3C WebDX Community Group</text>
</svg>
