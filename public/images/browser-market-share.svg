<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Instrument Sans', system-ui, sans-serif">
  <rect width="680" height="240" fill="#131420"/>

  <text x="340" y="20" font-size="11" fill="#4a5568" text-anchor="middle" letter-spacing="0.08em">BROWSER MARKET SHARE — DESKTOP WORLDWIDE (approximate)</text>

  <!-- Y axis -->
  <line x1="60" y1="30" x2="60" y2="180" stroke="#1d242f" stroke-width="1"/>
  <!-- X axis -->
  <line x1="60" y1="180" x2="660" y2="180" stroke="#1d242f" stroke-width="1"/>

  <!-- Y labels -->
  <text x="54" y="34" font-size="9" fill="#4a5568" text-anchor="end">100%</text>
  <text x="54" y="84" font-size="9" fill="#4a5568" text-anchor="end">50%</text>
  <text x="54" y="134" font-size="9" fill="#4a5568" text-anchor="end">25%</text>
  <text x="54" y="184" font-size="9" fill="#4a5568" text-anchor="end">0%</text>

  <!-- Y grid lines -->
  <line x1="60" y1="84" x2="660" y2="84" stroke="#1f2035" stroke-width="1"/>
  <line x1="60" y1="134" x2="660" y2="134" stroke="#1f2035" stroke-width="1"/>

  <!-- X labels (years) -->
  <text x="80" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2003</text>
  <text x="170" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2006</text>
  <text x="260" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2009</text>
  <text x="350" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2012</text>
  <text x="440" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2015</text>
  <text x="530" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2018</text>
  <text x="620" y="196" font-size="9" fill="#4a5568" text-anchor="middle">2023</text>

  <!-- IE line — high from 2003, peaks ~95%, then falls -->
  <!-- IE: 2003=90%, 2006=85%, 2009=65%, 2012=35%, 2015=20%, 2018=8%, 2023=2% -->
  <!-- y = 180 - (val/100)*150 -->
  <!-- 90%→45, 85%→52, 65%→82, 35%→127, 20%→150, 8%→168, 2%→177 -->
  <polyline points="80,45 170,52 260,82 350,127 440,150 530,168 620,177"
    fill="none" stroke="#4a5568" stroke-width="2"/>
  <text x="88" y="43" font-size="9" fill="#4a5568">IE</text>

  <!-- Firefox: 2003=2%, 2006=12%, 2009=23%, 2012=24%, 2015=15%, 2018=9%, 2023=4% -->
  <!-- 2%→177, 12%→162, 23%→145, 24%→144, 15%→157, 9%→166, 4%→174 -->
  <polyline points="80,177 170,162 260,145 350,144 440,157 530,166 620,174"
    fill="none" stroke="#a0aec0" stroke-width="2"/>
  <text x="172" y="156" font-size="9" fill="#a0aec0">Firefox</text>

  <!-- Chrome: 2003=0%, 2006=0%, 2009=4%, 2012=33%, 2015=52%, 2018=68%, 2023=66% -->
  <!-- 0→180, 0→180, 4%→174, 33%→130, 52%→102, 68%→78, 66%→81 -->
  <polyline points="260,180 350,130 440,102 530,78 620,81"
    fill="none" stroke="#ff3c00" stroke-width="2.5"/>
  <text x="538" y="72" font-size="9" fill="#ff3c00" font-weight="600">Chrome</text>

  <!-- Safari: 2003=1%, 2006=2%, 2009=4%, 2012=7%, 2015=10%, 2018=13%, 2023=19% -->
  <polyline points="80,178 170,177 260,174 350,169 440,165 530,160 620,151"
    fill="none" stroke="#1d242f" stroke-width="1.5"/>
  <text x="628" y="147" font-size="9" fill="#4a5568">Safari</text>

  <!-- Chrome launch annotation -->
  <line x1="260" y1="175" x2="260" y2="185" stroke="#ff3c00" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="262" y="210" font-size="8" fill="#ff3c00">Chrome</text>
  <text x="262" y="220" font-size="8" fill="#ff3c00">launch (2008)</text>

  <!-- Firefox 1.0 -->
  <line x1="170" y1="157" x2="170" y2="185" stroke="#a0aec0" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="130" y="210" font-size="8" fill="#a0aec0">Firefox 1.0</text>
  <text x="130" y="220" font-size="8" fill="#4a5568">(2004)</text>
</svg>
